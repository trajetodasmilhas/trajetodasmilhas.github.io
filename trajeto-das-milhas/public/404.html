<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Trajeto das Milhas - Redirect</title>
    <script type="text/javascript">
      // Script para redirecionar rotas limpas no GitHub Pages para o index.html
      // de forma que o BrowserRouter possa assumir a rota.
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        '/?/' + l.pathname.slice(1).split('/').join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
